<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --accent: #2563EB;
    --accent-dark: #1d4ed8;
    --accent-light: rgba(37, 99, 235, 0.12);
    --bg-body: #0A0A0A;
    --bg-card: #111111;
    --bg-elevated: #1A1A1A;
    --text-primary: #F8F8F8;
    --text-secondary: #A0A0A0;
    --text-muted: #606060;
    --border: rgba(255,255,255,0.08);
    --radius-card: 12px;
    --radius-btn: 8px;
    --radius-pill: 9999px;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    font-family: 'Outfit', sans-serif;
    background-color: var(--bg-body);
    color: var(--text-primary);
    line-height: 1.6;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(24px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes subtlePulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  .animate-fade-in {
    animation: fadeIn 0.6s ease forwards;
  }

  .animate-fade-up {
    opacity: 0;
    animation: fadeInUp 0.7s ease forwards;
  }

  .delay-1 { animation-delay: 0.1s; }
  .delay-2 { animation-delay: 0.2s; }
  .delay-3 { animation-delay: 0.35s; }
  .delay-4 { animation-delay: 0.5s; }
  .delay-5 { animation-delay: 0.65s; }
  .delay-6 { animation-delay: 0.8s; }

  /* LAYOUT */
  .container {
    width: 100%;
    max-width: 860px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .container--wide {
    max-width: 1100px;
  }

  /* TOP BAR */
  .topbar {
    width: 100%;
    padding: 20px 24px;
    display: flex;
    justify-content: center;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background-color: var(--bg-body);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    background-color: rgba(10, 10, 10, 0.92);
  }

  .logo {
    height: 36px;
    width: auto;
    display: block;
    object-fit: contain;
  }

  .logo-fallback {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.02em;
  }

  .logo-fallback span {
    color: var(--accent);
  }

  /* HERO SECTION */
  .hero {
    padding: 80px 0 60px;
    text-align: center;
  }

  .pill-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background-color: var(--accent-light);
    border: 1px solid rgba(37, 99, 235, 0.3);
    color: #93b4fd;
    font-size: clamp(0.7rem, 2vw, 0.8rem);
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: var(--radius-pill);
    margin-bottom: 28px;
  }

  .pill-badge .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background-color: var(--accent);
    animation: subtlePulse 2s ease infinite;
    flex-shrink: 0;
  }

  .hero-headline {
    font-size: clamp(2rem, 5.5vw, 3.4rem);
    font-weight: 800;
    line-height: 1.15;
    letter-spacing: -0.03em;
    color: var(--text-primary);
    margin-bottom: 24px;
    max-width: 760px;
    margin-left: auto;
    margin-right: auto;
  }

  .hero-headline .accent {
    color: var(--accent);
  }

  .hero-headline .underline-accent {
    position: relative;
    display: inline-block;
  }

  .hero-headline .underline-accent::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--accent);
    border-radius: 2px;
    opacity: 0.7;
  }

  .hero-subheadline {
    font-size: clamp(1rem, 2.5vw, 1.2rem);
    font-weight: 400;
    color: var(--text-secondary);
    max-width: 580px;
    margin: 0 auto 40px;
    line-height: 1.7;
  }

  /* CTA BUTTON */
  .btn-primary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background-color: var(--accent);
    color: #ffffff;
    font-family: 'Outfit', sans-serif;
    font-size: clamp(1rem, 2.5vw, 1.1rem);
    font-weight: 700;
    text-decoration: none;
    padding: 0 40px;
    min-height: 56px;
    border-radius: var(--radius-btn);
    border: none;
    cursor: pointer;
    transition: background-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    width: 100%;
    max-width: 440px;
    letter-spacing: -0.01em;
  }

  .btn-primary:hover {
    background-color: var(--accent-dark);
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(37, 99, 235, 0.35);
  }

  .btn-primary:active {
    transform: translateY(0);
  }

  .btn-primary svg {
    flex-shrink: 0;
    transition: transform 0.2s ease;
  }

  .btn-primary:hover svg {
    transform: translateX(3px);
  }

  .cta-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .cta-subtext {
    font-size: 0.8rem;
    color: var(--text-muted);
    font-weight: 400;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .cta-subtext svg {
    color: #4ade80;
    flex-shrink: 0;
  }

  /* SOCIAL PROOF BAR */
  .social-proof-bar {
    background-color: var(--bg-card);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 32px 0;
  }

  .social-proof-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0;
  }

  .proof-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 16px 32px;
    border-right: 1px solid var(--border);
    flex: 1;
    min-width: 140px;
  }

  .proof-item:last-child {
    border-right: none;
  }

  .proof-number {
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -0.03em;
    line-height: 1.1;
  }

  .proof-number .accent {
    color: var(--accent);
  }

  .proof-label {
    font-size: 0.78rem;
    color: var(--text-muted);
    font-weight: 500;
    margin-top: 4px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  /* BENEFITS SECTION */
  .benefits {
    padding: 80px 0;
  }

  .section-label {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
    text-align: center;
  }

  .section-title {
    font-size: clamp(1.5rem, 4vw, 2.2rem);
    font-weight: 800;
    letter-spacing: -0.025em;
    color: var(--text-primary);
    text-align: center;
    margin-bottom: 12px;
    line-height: 1.2;
  }

  .section-subtitle {
    font-size: clamp(0.95rem, 2vw, 1.05rem);
    color: var(--text-secondary);
    text-align: center;
    max-width: 520px;
    margin: 0 auto 52px;
    line-height: 1.7;
  }

  .benefits-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }

  @media (min-width: 600px) {
    .benefits-grid {
      grid-template-columns: 1fr 1fr;
    }
  }

  .benefit-card {
    background-color: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-card);
    padding: 28px;
    transition: border-color 0.2s ease, transform 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .benefit-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .benefit-card:hover {
    border-color: rgba(37, 99, 235, 0.3);
    transform: translateY(-2px);
  }

  .benefit-card:hover::before {
    opacity: 1;
  }

  .benefit-icon {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background-color: var(--accent-light);
    border: 1px solid rgba(37, 99, 235, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    flex-shrink: 0;
  }

  .benefit-icon svg {
    color: var(--accent);
  }

  .benefit-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }

  .benefit-desc {
    font-size: 0.9rem;
    color: var(--text-secondary);
    line-height: 1.65;
  }

  /* CASE STUDY SECTION */
  .case-study {
    padding: 0 0 80px;
  }

  .case-study-card {
    background-color: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius-card);
    padding: 40px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    position: relative;
    overflow: hidden;
  }

  .case-study-card::after {
    content: '';
    position: absolute;
    top: -60px;
    right: -60px;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(37,99,235,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .case-study-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    background-color: var(--accent-light);
    border: 1px solid rgba(37, 99, 235, 0.25);
    padding: 5px 12px;
    border-radius: var(--radius-pill);
    width: fit-content;
  }

  .case-study-quote {
    font-size: clamp(1.1rem, 3vw, 1.4rem);
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.5;
    letter-spacing: -0.015em;
  }

  .case-study-quote strong {
    color: var(--accent);
  }

  .case-study-stats {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
  }

  .stat-pill {
    background-color: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-pill);
    padding: 10px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .stat-pill-value {
    font-size: 1.2rem;
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -0.02em;
  }

  .stat-pill-label {
    font-size: 0.72rem;
    color: var(--text-muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .case-study-author {
    display: flex;
    align-items: center;
    gap: 14px;
    border-top: 1px solid var(--border);
    padding-top: 24px;
  }

  .author-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #7c3aed);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 1rem;
    color: #fff;
    flex-shrink: 0;
  }

  .author-info-name {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text-primary);
  }

  .author-info-role {
    font-size: 0.8rem;
    color: var(--text-secondary);
  }

  /* GUARANTEE SECTION */
  .guarantee {
    padding: 0 0 80px;
  }

  .guarantee-card {
    background-color: var(--bg-card);
    border: 1px solid rgba(37, 99, 235, 0.2);
    border-radius: var(--radius-card);
    padding: 36px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    align-items: flex-start;
    text-align: left;
  }

  @media (min-width: 640px) {
    .guarantee-card {
      flex-direction: row;
      align-items: flex-start;
      gap: 24px;
    }
  }

  .guarantee-icon {
    width: 56px;
    height: 56px;
    border-radius: 12px;
    background-color: var(--accent-light);
    border: 1px solid rgba(37, 99, 235, 0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .guarantee-content {}

  .guarantee-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 8px;
    letter-spacing: -0.015em;
  }

  .guarantee-desc {
    font-size: 0.9rem;
    color: var(--text-secondary);
    line-height: 1.65;
  }

  /* MECHANISM SECTION */
  .mechanism {
    padding: 0 0 80px;
  }

  .steps-list {
    display: flex;
    flex-direction: column;
    gap: 0;
    position: relative;
  }

  .steps-list::before {
    content: '';
    position: absolute;
    left: 22px;
    top: 44px;
    bottom: 44px;
    width: 1px;
    background: linear-gradient(to bottom, var(--accent), transparent);
    opacity: 0.3;
  }

  @media (min-width: 600px) {
    .steps-list::before {
      left: 26px;
    }
  }

  .step-item {
    display: flex;
    gap: 20px;
    padding: 20px 0;
    align-items: flex-start;
    position: relative;
  }

  .step-number {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background-color: var(--bg-elevated);
    border: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    font-weight: 800;
    color: var(--accent);
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  @media (min-width: 600px) {
    .step-number {
      width: 52px;
      height: 52px;
    }
  }

  .step-content {
    padding-top: 8px;
    flex: 1;
  }

  .step-title {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }

  .step-desc {
    font-size: 0.9rem;
    color: var(--text-secondary);
    line-height: 1.65;
  }

  /* FINAL CTA SECTION */
  .final-cta {
    padding: 80px 0;
    background-color: var(--bg-card);
    border-top: 1px solid var(--border);
    text-align: center;
  }

  .final-cta .hero-headline {
    margin-bottom: 16px;
  }

  .final-cta .hero-subheadline {
    margin-bottom: 36px;
  }

  /* TRUST BADGES */
  .trust-badges {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    margin-top: 32px;
  }

  .trust-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0
